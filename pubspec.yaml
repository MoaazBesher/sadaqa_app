name: sadaqa_jaria
description: تطبيق صدقة جارية

publish_to: 'none'

version: 1.2.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_local_notifications: ^19.5.0
  webview_flutter: ^4.4.2
  share_plus: ^7.2.1
  url_launcher: ^6.1.0
  shared_preferences: ^2.2.2
  firebase_core: ^2.32.0
  firebase_database: ^10.5.7
  clipboard: ^0.1.3
  audioplayers: ^5.2.1  # ◀── أضف هذا
  just_audio: ^0.9.35
  geolocator: ^11.0.0
  timezone: ^0.10.1
  flutter_launcher_icons: ^0.13.1
  cloud_firestore: ^4.13.0
  package_info_plus: ^4.2.0
  firebase_messaging: ^14.7.0
  http: ^1.1.0




  # awesome_notifications: ^0.9.3
flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/images/
    - assets/sounds/
    # - assets/sounds/prayer_athan.mp3
    - assets/sounds/morning_azkar.mp3
    - assets/sounds/evening_azkar.mp3
  fonts:
    - family: Thuluth
      fonts:
        - asset: assets/fonts/arfonts-decotype-thuluth-ii.ttf
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700